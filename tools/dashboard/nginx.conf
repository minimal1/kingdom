server {
    listen 9000;
    server_name _;

    # 대시보드 HTML
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # dashboard.json (directory mount — file mount는 mv 시 inode 변경으로 갱신 안됨)
    location = /state/dashboard.json {
        alias /data/state/dashboard.json;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }
}
