# yaml-language-server: $schema=../../schemas/general-manifest.schema.json
name: gen-jira
description: "Jira 티켓 대응 장군 — repo-bound harnessed_dev 개발 워크플로우 초안"
timeout_seconds: 1800

cc_plugins:
  - friday@qp-plugin

mode: harnessed_dev

supported_engines:
  - claude

default_repo: chequer-io/querypie-mono

harness:
  profile: querypie-mono-dev
  phases:
    - bootstrap
    - intake
    - plan
    - execute
    - review
    - validate
    - decide
    - report

subscribes:
  - jira.ticket.assigned
  - jira.ticket.updated

schedules: []
