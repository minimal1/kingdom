# yaml-language-server: $schema=../../schemas/general-manifest.schema.json
name: gen-test-writer
description: "테스트 코드 자동 작성 장군 — 테스트 공백을 찾아 1개씩 커버리지 확장 후 PR 오픈"
timeout_seconds: 1800

cc_plugins: []

supported_engines:
  - claude
  - codex

subscribes: []

schedules:
  - name: periodic-test-write
    cron: "*/30 * * * *"
    task_type: test-write
    repo: chequer-io/querypie-mono
    payload:
      base_branch: develop
      mode: write

  - name: weekly-test-merge
    cron: "0 9 * * 1"
    task_type: test-merge
    repo: chequer-io/querypie-mono
    payload:
      base_branch: develop
      mode: merge
